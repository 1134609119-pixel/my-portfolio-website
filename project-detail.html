<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>项目详情 - AI驱动的小红书养生帐号数据增长</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary-cyan: #00bcd4; --accent-yellow: #fece02; }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .bg-card { background-color: #1a1a1a; }
        .text-cyan { color: var(--primary-cyan); }
        .bg-cyan { background-color: var(--primary-cyan); }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        /* 解决方案淡入动画 */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 1s ease-out, transform 1s ease-out; }
    </style>
</head>
